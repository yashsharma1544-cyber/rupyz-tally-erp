; Sushil Agencies — Tally Agent configuration
;
; Copy this file to config.ini and fill in the values. The file is read every
; time the agent starts.

[tally]
; URL where Tally Prime's HTTP server is listening.
; Default Tally port is 9000. The agent runs on the Tally machine itself,
; so localhost is correct.
url = http://localhost:9000

[app]
; URL of your ERP. No trailing slash.
url = https://rupyz-tally-erp.vercel.app

; Agent secret. Generate this in your ERP's Settings > Tally panel and paste
; here. KEEP THIS SECRET — anyone with it can write outstanding data into your
; database.
agent_secret = REPLACE_WITH_SECRET_FROM_ERP_SETTINGS

[agent]
; Local web UI port. Open http://localhost:<port> in a browser on this machine
; to trigger a sync.
local_port = 7531
